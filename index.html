<!-- ===== Demo Booking Modal ===== -->
<div class="modal-overlay" id="demoModal">
  <div class="modal-content">
    <button class="modal-close" id="modalClose" aria-label="閉じる">×</button>
    <div class="modal-header">
      <div class="modal-label">DEMO BOOKING</div>
      <h2 class="modal-title">全国無料訪問デモ</h2>
      <p class="modal-sub">以下の情報をご入力ください。<br>担当者より改めてご連絡いたします。</p>
    </div>

    <form class="demo-form" id="demoForm" action="https://formsubmit.co/info@lenard.jp" method="POST">
      <input type="hidden" name="_subject" value="【BYMACH PRO LP】無料デモ予約の申込">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://bymach-lp.vercel.app/thanks.html">
      <input type="hidden" name="_template" value="table">

      <div class="form-group">
        <label for="name">お名前 <span class="required">必須</span></label>
        <input type="text" id="name" name="お名前" required>
      </div>

      <div class="form-group">
        <label for="salon">サロン名 <span class="required">必須</span></label>
        <input type="text" id="salon" name="サロン名" required>
      </div>

      <div class="form-group">
        <label for="tel">電話番号 <span class="required">必須</span></label>
        <input type="tel" id="tel" name="電話番号" required>
      </div>

      <div class="form-group">
        <label for="email">メールアドレス <span class="required">必須</span></label>
        <input type="email" id="email" name="メールアドレス" required>
      </div>

      <div class="form-group">
        <label for="area">ご希望エリア・都道府県 <span class="required">必須</span></label>
        <input type="text" id="area" name="ご希望エリア" placeholder="例: 東京都渋谷区" required>
      </div>

      <div class="form-group">
        <label for="message">ご相談内容(任意)</label>
        <textarea id="message" name="ご相談内容" rows="4" placeholder="ご質問・ご希望日時などございましたらご記入ください"></textarea>
      </div>

      <button type="submit" class="form-submit">デモ予約を申し込む</button>

      <p class="form-note">
        送信いただいた情報は、デモ予約のご連絡以外には使用いたしません。
      </p>
    </form>
  </div>
